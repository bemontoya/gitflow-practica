name: Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar y Probar
        run: |
          npm install
          npm test
      - name: Build Docker
        run: docker build -t mi-app .